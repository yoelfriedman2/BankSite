<svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="48" height="48" rx="12" fill="#0f172a"/>
  <rect width="48" height="48" rx="12" fill="url(#d)"/>
  <rect x="0" y="0" width="48" height="1.5" rx="0.75" fill="#ffffff" fill-opacity="0.08"/>
  <defs>
    <linearGradient id="d" x1="0" y1="0" x2="0" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.2"/>
    </linearGradient>
  </defs>
  <!-- Top bar: longest — gold -->
  <rect x="8" y="9" width="32" height="7.5" rx="3.75" fill="#F59E0B"/>
  <!-- Middle bar: half-length — white -->
